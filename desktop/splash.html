<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 480px; height: 320px;
      background: transparent;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      -webkit-app-region: drag;
    }
    .card {
      width: 100%; height: 100%;
      background: #1a1d27;
      border-radius: 16px;
      border: 1px solid #2a2d3e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      box-shadow: 0 32px 80px rgba(0,0,0,.6);
    }
    .logo { font-size: 4rem; }
    h1 { font-size: 1.8rem; font-weight: 700; color: #e2e8f0; }
    p  { font-size: 0.9rem; color: #64748b; }
    .progress {
      width: 200px; height: 4px;
      background: #2a2d3e; border-radius: 4px; overflow: hidden;
    }
    .bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #6c63ff, #00d4aa);
      border-radius: 4px;
      animation: load 3s ease forwards;
    }
    @keyframes load {
      0%   { width: 0% }
      40%  { width: 60% }
      70%  { width: 80% }
      100% { width: 100% }
    }
    .version { font-size: 0.75rem; color: #475569; position: absolute; bottom: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🤖</div>
    <h1>MCP IA</h1>
    <p>Démarrage du backend IA…</p>
    <div class="progress"><div class="bar"></div></div>
    <span class="version">v1.0.0</span>
  </div>
</body>
</html>
